.module-body { display: none; padding: 5px 0; }
.module-body.open { display: block; }

.q-type.mcq { background: #e8eaf6; color: #283593; }
.q-type.open { background: #fff3e0; color: #e65100; }
.q-type.short { background: #e0f2f1; color: #004d40; }
.q-type.essay { background: #fce4ec; color: #880e4f; }
.q-type.correct { background: #f3e5f5; color: #6a1b9a; }
.options { display: flex; flex-direction: column; gap: 6px; }
.option {
  padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px;
  cursor: pointer; font-size: 0.9rem; transition: all 0.2s;

.option:hover { border-color: var(--primary); background: #f5f5f5; }
.option.selected { border-color: var(--primary); background: var(--highlight); }
.option.correct { background: var(--success) !important; border-color: var(--accent) !important; color: #1b5e20; }
.option.wrong { background: var(--important) !important; border-color: var(--secondary) !important; color: #b71c1c; }
.option.disabled { cursor: default; opacity: 0.7; }
.option.disabled:hover { border-color: var(--border); background: transparent; }
.check-btn {
  margin-top: 8px; padding: 6px 18px; background: var(--primary); color: white;
  border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem;

.check-btn:hover { opacity: 0.9; }
.check-btn:disabled { opacity: 0.4; cursor: default; }
.feedback {
  display: none; margin-top: 10px; padding: 10px 14px; border-radius: 6px; font-size: 0.85rem;

.feedback.show { display: block; }
.feedback.correct-fb { background: var(--success); border-left: 3px solid var(--accent); }
.feedback.wrong-fb { background: var(--important); border-left: 3px solid var(--secondary); }
.reveal-btn {

  border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem;

.reveal-btn:hover { opacity: 0.9; }
.model-answer {

  background: #f1f8e9; border-left: 3px solid var(--accent);

.model-answer strong { color: var(--primary); }
.no-questions { text-align: center; padding: 40px; color: var(--muted); }
.reset-btn {
  padding: 5px 12px; border-radius: 16px; border: none; font-size: 0.8rem;

   a: "(A) National agency: Supported by BMG (stronger federal coordination capacity), some public health experts (consistent standards, national data). Opposed by Lander ministries (loss of planning authority), local Gesundheitsamter (fear of top-down control), CDU/CSU-FDP (federalism principle). Feasibility: LOW — constitutional federalism makes centralisation extremely difficult; would require Grundgesetz amendment. (B) Strengthening OGD: Supported by Lander (retain authority with more resources), local Gesundheitsamter (more staff, better IT), BMG (improves capacity without conflict). Opposed by those wanting more fundamental reform, some fiscal conservatives (ongoing cost). Feasibility: HIGHEST — politically least disruptive, builds on existing structures, 'Pakt fur den OGD' model already exists. (C) Structural prevention: Supported by public health academics, WHO, prevention advocates. Opposed by industry (food, tobacco, alcohol), BMG (limited jurisdiction), some Lander (regulatory burden), economic ministries (regulation costs). Feasibility: MODERATE-LOW — faces strong industry opposition; requires cross-ministerial coordination Germany's fragmented governance makes difficult but not impossible (e.g., tobacco advertising bans passed eventually). Most viable: Approach B, as it faces the fewest veto players and aligns with incremental German reform patterns."

   q: "Scenario: You are a health policy analyst asked to brief a parliamentary committee on Germany's health system performance. Using the Germany Country Health Profile 2025 framework, prepare a structured analysis covering: (a) Life expectancy and avoidable mortality — what does the data show and what concepts explain it? (b) Health expenditure and prevention spending — is Germany getting value for money? (c) Access and financial protection — what do the indicators capture and what do they miss? (d) Behavioural risk factors — what does the profile tell us about population health determinants? For each section, identify at least one limitation of the indicator used. (400-450 words)",
   a: "(a) Life expectancy (~81 years) slightly below EU average despite highest OECD spending. Amenable mortality (treatable causes) relatively good — acute care works. Preventable mortality above EU average — prevention underinvestment. Concept: allocative inefficiency — spending mix biased toward curative care. Limitation: aggregate life expectancy masks the 10-year socioeconomic gradient. (b) Health expenditure ~12.8% GDP (well above OECD ~9%). Prevention spending ~3% vs OECD ~6%. Performance paradox: high spending without proportionate outcomes. Technical inefficiency: high hospital bed density, long length of stay. Allocative inefficiency: curative bias. Limitation: expenditure data shows inputs, not quality or equity of spending. (c) 100% coverage since 2007, low OOP (~10%) — strong formal protection. But unmet need higher among low-income groups; GKV/PKV differences in specialist access not captured. Concept: formal vs substantive universality. Limitation: coverage indicators measure insurance status, not actual access or quality of care received. (d) Smoking declining but above EU average; alcohol consumption high; obesity rising; physical activity low. Emphasis on individual behavioural indicators. Concept: individualisation of prevention — profile focusses on behaviour, not structural determinants (housing, income, food environment). Limitation: behavioural risk factors tell us what people do, not why — missing social determinants and policy environment."

   type: "essay",
   q: "Scenario: The Krankenhausversorgungsverbesserungsgesetz (KHVVG) 2024 aimed to improve hospital quality by concentrating specialised services in fewer hospitals meeting defined quality standards. Apply Historical Institutionalism and Actor-Centred Institutionalism to analyse: (a) Which historical institutional arrangements help explain the current hospital sector structure? (b) Which actors supported and opposed the reform, and which veto players were critical? (c) Does the reform represent layering, conversion, drift, or displacement? (d) Why did the final law differ from the original BMG proposal? (300-350 words)",
   a: "(a) Historical institutional arrangements: (1) Dual financing — Lander responsible for investment, sickness funds for operating costs; Lander have strong incentive to keep hospitals open (political credit) while underfunding investment. (2) Corporatist hospital planning through Lander hospital plans — creates path dependency: existing hospitals generate local constituencies. (3) Sectoral separation (ambulatory/inpatient) means hospitals have cross-subsidised outpatient care. (b) BMG supported quality-based concentration; Lander (especially those with many small hospitals) opposed losing planning authority; hospital associations (DKG) defended member interests; physicians divided — specialists support quality thresholds, local hospitals fear closure. Critical veto players: Bundesrat (Lander), providing opportunity for negotiation and weakening. (c) Layering — new quality requirements added onto existing hospital planning and financing structures without abolishing Lander planning authority or dual financing. (d) Joint decision trap: BMG's original proposal (binding volume targets, stricter quality requirements) weakened through Bundesrat negotiation — targets became non-binding, timelines extended, exceptions added. The outcome reflects Scharpf's Politikverflechtungsfalle: when federal and state governments must agree, the lowest common denominator prevails."

   id: "m8o7",
   m: 8,
   type: "essay",
   q: "Scenario: Germany's GKV faces increasing financial pressure from population ageing, rising healthcare costs, workforce shortages, and medical innovation. Governments regularly introduce measures such as contribution adjustments, federal subsidies, and expenditure controls to stabilise financing, yet fundamental reform never occurs. Using Historical Institutionalism and veto player theory, explain: (a) Why do governments consistently choose adaptation rather than fundamental redesign? (b) Which actors resist fundamental financing reform and what resources do they possess? (c) Using the modes of gradual change, how would you classify recent GKV financing reforms? (300-350 words)",
   a: "(a) Path dependency explains incremental adaptation: the 1883 Bismarck model created self-reinforcing dynamics — sunk costs in the existing contribution-based system, learning effects (actors know how to operate within current rules), coordination effects (complementary institutions like Beitragsbemessungsgrenze, employer co-financing, Morbi-RSA have evolved around the existing path), and adaptive expectations (all actors expect gradual adjustment, not fundamental change). Fundamental redesign would face enormous transition costs and uncertainty. (b) Resisting actors: PKV companies (business model depends on dual system), employer associations (Beitragsbemessungsgrenze caps their contributions), high-income earners (would pay more under expanded base), FDP (ideological opposition to centralisation/Citizens' Insurance), CDU/CSU (defends status differentiation). Resources: PKV-Verband lobbying capacity, employer associations' institutional access, Constitutional Court property rights protection, Bundesrat veto power. (c) Recent reforms represent layering — federal subsidies added onto existing contribution financing, expenditure controls layered onto existing governance without changing the underlying contribution-based architecture. No displacement has occurred; the financing model created in 1883 with employer-employee contributions and plural sickness funds remains intact."

   a: "(a) Current model: GKV financed mainly through income-related contributions on employment income (wages/salaries), shared by employees and employers, up to the Beitragsbemessungsgrenze. Proposed: include capital gains (dividends, interest), rental income, and investment returns in the contribution base. This would broaden the base without raising contribution rates. (b) Actor positions: (1) SPD/Greens — support (strengthens solidarity, broadens base). (2) FDP — oppose (tax on capital, interferes with investment incentives, anti-market). (3) Employer associations — oppose (fear precedent for higher total contributions, slippery slope to Burgerversicherung). (4) Trade unions — cautiously support (strengthens GKV, but worry about employer contribution implications). (5) High-income earners with capital income — oppose (would pay more). (6) GKV funds — support (improves financial sustainability). (c) Explanatory frameworks: (1) Varieties of Capitalism — Germany as CME: employer coordination through non-market mechanisms matters; employers resist anything increasing labour costs or expanding contribution base. (2) Path dependency — contribution model based on employment income is locked in; expanding to capital income would be a significant departure. (3) Veto player theory — FDP as consistent coalition partner blocks tax-like contributions; Constitutional Court protects property rights. (4) Esping-Andersen — conservative-corporatist systems preserve status-based insurance; expanding base would reduce status differentiation."

  {
   id: "m9o11",
   m: 9,
   type: "essay",
   q: "Scenario: A health policy researcher argues that 'Germany's prevention spending would increase if only policymakers understood the evidence that prevention saves money.' Critically evaluate this argument using concepts from political economy and Historical Institutionalism. Why might evidence alone be insufficient to shift resource allocation toward prevention? (250-300 words)",
   a: "The argument that evidence alone can shift resources is naive from a political economy perspective. Reasons evidence is insufficient: (1) Medical-industrial complex: curative care has powerful, well-funded organised interests (pharma, device manufacturers, hospital chains, specialist physicians) that actively resist reallocation toward prevention. These actors have lobbying capacity, campaign contributions, and institutional access that prevention advocates lack. (2) Path dependency: the 1883 Bismarck model established curative care as the system's primary function. Increasing returns — hospitals, medical training, physician reimbursement, and patient expectations have all adapted to curative dominance. Reversing this is expensive and disruptive. (3) Time horizons: prevention benefits take decades to materialise, while political actors face election cycles of 4-5 years. Curative spending produces visible, immediate results (treating sick patients). This 'temporal mismatch' makes prevention politically unattractive. (4) Corporatist governance: G-BA includes payers and providers but no representation for prevention, public health, or population health perspectives. The institutional architecture of German health governance structurally underrepresents prevention. (5) Veto players: industry associations, physician groups, and Lander can block prevention-oriented regulation (e.g., sugar taxes, advertising bans). Conclusion: evidence is necessary but insufficient — changing prevention spending requires addressing the political economy and institutional structures that produce the curative bias."

   a: "(1) Description: Germany spends ~3% of health expenditure on prevention (OECD ~6%). Chronic diseases rising, population ageing. Key actors: GKV (SGB V \$20 prevention programmes), Lander OGD (local public health), NPK (since 2015). Prevention focuses on individual behaviour (exercise subsidies, check-ups) rather than structural determinants. (2) Explanation: Path dependency — 1883 Bismarck model established curative focus. Medical-industrial complex — commercial interests (pharma, devices) prioritise technology-intensive care over prevention. ACI — G-BA corporatism includes payers and providers but no prevention representation. Political economy — prevention benefits are long-term and diffuse, while curative spending produces visible, immediate results that politicians prefer. Veto players — industry associations block regulation (sugar taxes, advertising bans). Esping-Andersen's conservative-corporatist welfare state: status preservation, not public health. (3) Evaluation: Benefits of more prevention — improved population health, reduced socioeconomic gradient, long-term cost savings. Challenges — upfront investment, results take decades, powerful interests resist. Required — binding prevention targets with enforcement, strengthened NPK with veto power over resource allocation, HiAP approach requiring health impact assessments for all legislation, political coalition overcoming industry opposition. Likelihood: incremental improvement possible (layering on NPK) but fundamental reallocation unlikely without a major health crisis shifting political cost calculus."

   a: "(1) Description: Dual financing — operating costs via DRG (sickness funds), investment via Lander budgets. Lander have systematically underfunded investment since the 1990s, leading to estimated investment backlog of several billion euros. Hospitals cross-subsidise investment from DRG revenue, distorting competition and inflating treatment volumes. Key actors: Lander (responsible for investment but face competing budget priorities), BMG (federal framework), DKG (hospital association), GKV-Spitzenverband (payers). (2) Explanation: Path dependency — dual financing established in 1972 (Krankenhausfinanzierungsgesetz) created institutional separation that is difficult to unwind. Lander have no electoral incentive to increase investment (hospital closures unpopular, investment invisible to voters). Joint decision trap — federal reform requires Lander consent (Bundesrat); Lander resist losing investment control or accepting binding standards. ACI — Lander ministries of finance oppose investment obligations; BMG competence limited to operating costs; GKV funds resist taking over investment (would require contribution increases). (3) Evaluation: Options — (A) maintain dual financing with binding Lander investment obligations (politically difficult, enforcement weak); (B) shift investment to sickness funds via DRG surcharge (would increase contributions, Lander lose power, likely vetoed by Bundesrat); (C) hybrid model — federal infrastructure fund with Lander matching (politically most feasible, aligns with German incremental reform pattern). Required: constitutional reform likely needed for option B; political coalition to overcome Lander resistance; transparent monitoring of investment spending."

var progress = JSON.parse(localStorage.getItem('gh8_exercise_progress') || '{}');

function qTypeLabel(t) {
  var map = {mcq:"Multiple Choice", essay:"Essay"};
  return map[t] || t;
}

function render() {
  var app = document.getElementById('app');
  app.innerHTML = '';
  var modFilter = document.getElementById('moduleFilter').value;
  var typeFilter = document.getElementById('typeFilter').value;
  var shown = questions.filter(function(q){
    if (modFilter !== 'all' && q.m !== parseInt(modFilter)) return false;
    if (typeFilter !== 'all' && q.type !== typeFilter) return false;
    return true;
  });
  var byModule = {};
  shown.forEach(function(q){
    if (!byModule[q.m]) byModule[q.m] = [];
    byModule[q.m].push(q);
  });
  var totalQ = questions.length;
  var answeredQ = Object.keys(progress).length;
  document.getElementById('stats').textContent = totalQ + ' questions total';
  document.getElementById('progressText').textContent = answeredQ + '/' + totalQ + ' answered';
  var sel = document.getElementById('moduleFilter');
  if (sel.options.length === 1) {
    for (var i = 1; i <= 10; i++) {
      var opt = document.createElement('option');
      opt.value = i;
      opt.textContent = 'Module ' + i;
      sel.appendChild(opt);
    }
  }
  if (shown.length === 0) {
    app.innerHTML = '<div class="no-questions">No questions match your filters.</div>';
    return;
  }
  var modKeys = Object.keys(byModule).sort(function(a,b){return a-b;});
  modKeys.forEach(function(m){
    var name = MODULE_NAMES[m-1] || 'Module ' + m;
    var qs = byModule[m];
    var mcqCount = qs.filter(function(q){return q.type==='mcq';}).length;
    var oc = qs.length - mcqCount;
    var sec = document.createElement('div');
    sec.className = 'module-section';
    var header = document.createElement('div');
    header.className = 'module-header';
    header.onclick = function(){ this.nextElementSibling.classList.toggle('open'); this.querySelector('.arrow').classList.toggle('open'); };
    header.innerHTML = '<h2>'+name+'</h2><span class="count">'+qs.length+' questions ('+mcqCount+' MC, '+oc+' open)</span><span class="arrow">&#9660;</span>';
    var body = document.createElement('div');
    body.className = 'module-body';
    qs.forEach(function(q){
      var card = document.createElement('div');
      card.className = 'question-card';
      card.id = q.id;
      var done = progress[q.id];
      var html = '<div class="q-type '+q.type+'">'+qTypeLabel(q.type)+'</div><div class="q-text">' + q.q + '</div>';
      if (q.type === 'mcq') {
        html += '<div class="options" id="opts-'+q.id+'">';
        q.o.forEach(function(opt, i){
          var selClass = (done && done.selected === i) ? ' selected' : '';
          html += '<div class="option'+selClass+'" data-idx="'+i+'" onclick="selectOption(\''+q.id+'\','+i+')">'+opt+'</div>';
        });
        html += '</div>';
        html += '<button class="check-btn" id="check-'+q.id+'" onclick="checkMCQ(\''+q.id+'\')">Check Answer</button>';
        html += '<div class="feedback" id="fb-'+q.id+'"></div>';
        if (done && done.checked) {
          html += '<scr'+'ipt>setTimeout(function(){ checkMCQ("'+q.id+'"); }, 0);</scr'+'ipt>';
        }
      } else if (q.type === 'correct') {
        html += '<div style="margin-bottom:8px;font-size:0.85rem;color:var(--muted);"><em>Each statement below contains an error. Identify and correct it.</em></div><ol style="margin-left:18px;margin-bottom:8px;">';
        q.statements.forEach(function(s){ html += '<li style="margin-bottom:6px;font-size:0.9rem;">'+s+'</li>'; });
        html += '</ol><button class="reveal-btn" onclick="revealAnswer(\''+q.id+'\')">Show Corrections</button>';
        html += '<div class="model-answer" id="ans-'+q.id+'"><strong>Corrections:</strong><ol style="margin-left:18px;margin-top:6px;">';
        q.corrections.forEach(function(c){ html += '<li style="margin-bottom:6px;">'+c+'</li>'; });
        html += '</ol></div>';
      } else {
        html += '<button class="reveal-btn" onclick="revealAnswer(\''+q.id+'\')">Show Answer</button>';
        html += '<div class="model-answer" id="ans-'+q.id+'">'+q.a+'</div>';
        if (done && done.revealed) {
          html += '<scr'+'ipt>setTimeout(function(){ revealAnswer("'+q.id+'"); }, 0);</scr'+'ipt>';
        }
      }
      card.innerHTML = html;
      body.appendChild(card);
    });
    sec.appendChild(header);
    sec.appendChild(body);
    app.appendChild(sec);
  });
}

function selectOption(qId, idx) {
  var opts = document.querySelectorAll('#opts-'+qId+' .option');
  opts.forEach(function(o){ o.classList.remove('selected'); });
  opts[idx].classList.add('selected');
  progress[qId] = {selected: idx, checked: false};
  localStorage.setItem('gh8_exercise_progress', JSON.stringify(progress));
}

function checkMCQ(qId) {
  var q = questions.find(function(x){return x.id===qId;});
  if (!q) return;
  var opts = document.querySelectorAll('#opts-'+qId+' .option');
  var selected = -1;
  opts.forEach(function(o, i){
    if (o.classList.contains('selected')) selected = i;
    o.classList.add('disabled');
    o.onclick = null;
    if (i === q.a) o.classList.add('correct');
    else if (i === selected && i !== q.a) o.classList.add('wrong');
  });
  document.getElementById('check-'+qId).disabled = true;
  var fb = document.getElementById('fb-'+qId);
  if (selected === q.a) {
    fb.className = 'feedback show correct-fb';
    fb.textContent = 'Correct! ' + (q.exp || '');
  } else {
    fb.className = 'feedback show wrong-fb';
    fb.textContent = 'Incorrect. The correct answer was: ' + q.o[q.a] + '. ' + (q.exp || '');
  }
  progress[qId] = {selected: selected, checked: true, correct: selected === q.a};
  localStorage.setItem('gh8_exercise_progress', JSON.stringify(progress));
  updateStats();
}

function revealAnswer(qId) {
  document.getElementById('ans-'+qId).classList.add('show');
  progress[qId] = {revealed: true};
  localStorage.setItem('gh8_exercise_progress', JSON.stringify(progress));
  updateStats();
}

function updateStats() {
  var totalQ = questions.length;
  var answeredQ = Object.keys(progress).length;
  document.getElementById('stats').textContent = totalQ + ' questions total';
  document.getElementById('progressText').textContent = answeredQ + '/' + totalQ + ' answered';
}

function applyFilter() { render(); }

function resetProgress() {
  if (confirm('Reset all progress?')) {
    progress = {};
    localStorage.removeItem('gh8_exercise_progress');
    render();
  }
}

render();
</script>
